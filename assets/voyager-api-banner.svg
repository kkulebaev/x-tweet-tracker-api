  <text x="300" y="190" fill="#9CA3AF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="24">Storage + admin endpoints for x-tweet-tracker</text>
  <text x="300" y="236" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas" font-size="18">Railway · Postgres · Prisma · X API (via cron)</text>


  <path d="M120 150h96" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
  <path d="M120 120h64" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <path d="M120 180h72" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <circle cx="226" cy="150" r="8" fill="#22D3EE"/>

